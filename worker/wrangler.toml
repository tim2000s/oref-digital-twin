name = "oref-twin-narrator"
main = "worker.js"
compatibility_date = "2024-11-01"

# Workers AI — free daily allocation; the narrator uses a small Llama model.
[ai]
binding = "AI"

# Lock CORS to your Pages origin in production (leave unset to echo the caller's origin).
[vars]
ALLOWED_ORIGIN = ""

# Optional per-IP rate limit. Uncomment and configure to enable (binds as env.RL):
# [[unsafe.bindings]]
# name = "RL"
# type = "ratelimit"
# namespace_id = "1001"
# simple = { limit = 20, period = 60 }
