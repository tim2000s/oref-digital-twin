name = "oref-digital-twin"
main = "worker.js"
compatibility_date = "2024-11-01"

# Workers AI — free daily allocation; the narrator uses a small Llama model.
[ai]
binding = "AI"

# CORS: only allow the Pages site to call the Worker.
[vars]
ALLOWED_ORIGIN = "https://tim2000s.github.io"

# Per-IP rate limit (binds as env.RL): 20 requests per 60 seconds.
# A public keyless endpoint can be abused, which would burn the Workers AI allocation.
[[unsafe.bindings]]
name = "RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }
